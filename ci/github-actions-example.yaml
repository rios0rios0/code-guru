# Example GitHub Actions workflow for Code Guru PR review.
# Copy this file to .github/workflows/code-guru.yaml in your repository.
#
# This is the pipeline-based approach (alternative to the webhook server).
# It triggers after your CI workflow completes and reviews the PR.

name: 'code-guru-review'

on:
  workflow_run:
    workflows: ['CI'] # replace with your CI workflow name
    types: ['completed']
    branches: ['main']

permissions:
  pull-requests: 'write'
  contents: 'read'

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Download code-guru'
        run: |
          VERSION="0.1.0" # pin to a specific version
          curl -sSL "https://github.com/rios0rios0/code-guru/releases/download/${VERSION}/code-guru_linux_amd64" -o code-guru
          chmod +x code-guru
          sudo mv code-guru /usr/local/bin/

      - name: 'Checkout rules'
        uses: 'actions/checkout@v4'
        with:
          repository: 'rios0rios0/guide'
          path: 'rules'

      - name: 'Run review'
        env:
          CODE_GURU_BACKEND: 'openai'
          CODE_GURU_OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'
          CODE_GURU_RULES_PATH: 'rules/.ai/claude/rules'
          CODE_GURU_PROVIDER_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          CODE_GURU_TRIVIAL_ADAPTERS: 'bump-go,docs-only'
        run: |
          PR_URL="${{ github.event.workflow_run.head_repository.html_url }}/pull/${{ github.event.workflow_run.pull_requests[0].number }}"
          code-guru review "$PR_URL"
